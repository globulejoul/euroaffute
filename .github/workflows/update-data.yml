name: Mise à jour des données de tirage

on:
  schedule:
    # LOTO : lundi, mercredi, samedi à 22h00 UTC (minuit heure de Paris)
    - cron: '0 22 * * 1,3,6'
    # EuroDreams : lundi, jeudi à 22h00 UTC
    - cron: '0 22 * * 1,4'
    # EuroMillions : mardi, vendredi à 22h00 UTC
    - cron: '0 22 * * 2,5'
  workflow_dispatch: # Permet le lancement manuel depuis l'interface GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer unzip
        run: sudo apt-get install -y unzip

      - name: Exécuter le script de mise à jour
        run: node scripts/update-data.js

      - name: Vérifier les changements
        id: check
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit et push si changements
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "data: mise à jour automatique des tirages ($DATE)"
          git push
